name: Check registry

# Fast guard on every PR and on pushes to main: the skill registry must satisfy
# the CLAUDE.md invariants (every shipped skill in plugin.json + the top and
# bucket READMEs under the right group, no excluded-bucket leakage, correct
# bucket counts, tile manifests + symlinks in sync). No secrets, no tessl CLI.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify skill registry invariants
        run: python3 scripts/check-registry.py
